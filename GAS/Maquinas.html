<div id="modulo-MAQUINAS" class="modulo-oculto" style="display: flex; flex-direction: column; height: 100%; overflow-y: hidden;">
  <h3 class="section-title">Gestão de Máquinas e Equipamentos</h3>
  
  <div style="display: flex; gap: 20px; flex-grow: 1; overflow: hidden; padding-bottom: 10px;">
    
    <div class="form-container" style="flex: 1; min-width: 260px; max-width: 320px; overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 20px;">
      <h4 style="margin-top: 0; margin-bottom: 15px; color: var(--primary);">Dados do Equipamento</h4>
      
      <input type="hidden" id="maq_id" value=""> 
      
      <label>FUEL (ÚNICO)</label>
      <input type="number" id="maq_fuel" class="input-form" placeholder="Ex: 12345">
      
      <label style="display:flex;justify-content:space-between;align-items:center;">
        Setor
        <button type="button" onclick="abrirModalSetores()" style="font-size:10px;background:none;border:none;color:#0ea5e9;cursor:pointer;font-weight:700;padding:0;">✏️ Gerenciar</button>
      </label>
      <select id="maq_setor" class="input-form">
        <option value="">— Selecione o setor —</option>
      </select>

      <label>Local Específico <span style="font-weight:400;color:#94a3b8;font-size:10px;">(opcional — ex: SALA 4, LEITO 03)</span></label>
      <input type="text" id="maq_local_esp" class="input-form" placeholder="Ex: SALA 4">
      
      <label>Modelo (Tipo de Ar)</label>
      <select id="maq_modelo" class="input-form">
        <option value="Split">Split</option>
        <option value="K7">K7</option>
        <option value="Piso Teto">Piso Teto</option>
        <option value="Chiller">Chiller</option>
        <option value="Fancoil">Fancoil (FanCoin)</option>
        <option value="VRF">VRF</option>
        <option value="Outros">Outros</option>
      </select>
      
      <label>Marca</label>
      <input type="text" id="maq_marca" class="input-form" placeholder="Ex: Carrier / Springer">

      <label>Número de Série</label>
      <input type="text" id="maq_serie" class="input-form" placeholder="Ex: 987654321A">

      <label>Criticidade</label>
      <select id="maq_criticidade" class="input-form">
        <option value="Baixa">Baixa</option>
        <option value="Média">Média</option>
        <option value="Alta">Alta</option>
      </select>

      <label>Capacidade</label>
      <input type="text" id="maq_capacidade" class="input-form" placeholder="Ex: 18.000 BTUs">

      <label>Empresa Prestadora</label>
      <select id="maq_empresa" class="input-form">
        <option value="">— Sem vínculo —</option>
      </select>

      <label>Ocupantes Fixos</label>
      <input type="number" id="maq_ocup_fixos" class="input-form" placeholder="Ex: 20" min="0">

      <label>Ocupantes Variáveis</label>
      <input type="number" id="maq_ocup_var" class="input-form" placeholder="Ex: 50" min="0">

      <label>Área Climatizada (m²)</label>
      <input type="number" id="maq_area" class="input-form" placeholder="Ex: 45" min="0" step="0.1">

      <div style="display: flex; gap: 10px; margin-top: 20px; margin-bottom: 10px; flex-shrink: 0;">
        <button onclick="salvarMaquina()" class="btn-primary" style="flex: 1;" id="btn-salvar-maq">Salvar</button>
        <button onclick="limparFormMaquina()" class="btn-primary" style="flex: 1; background: var(--text-muted); box-shadow: none;">Limpar</button>
      </div>
      
      <p id="msg-maquina" style="margin-top: 5px; font-weight: bold; font-size: 12px; text-align: center; min-height: 20px; flex-shrink: 0;"></p>
    </div>

    <div class="form-container" style="flex: 2.5; min-width: 0; display: flex; flex-direction: column; overflow: hidden;">
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
        <h4 style="margin: 0; color: var(--primary);">Máquinas Cadastradas</h4>
        <input type="text" id="busca-maquina" onkeyup="filtrarMaquinas()" placeholder="Buscar por FUEL, Setor ou Série..." style="padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; width: 100%; max-width: 300px; font-size: 13px; outline: none;">
      </div>
      
      <div style="overflow-x: auto; overflow-y: auto; flex-grow: 1; border: 1px solid #e2e8f0; border-radius: 4px;">
        <table style="width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; min-width: 650px;">
          <thead style="position: sticky; top: 0; background: #f8fafc; z-index: 1;">
            <tr style="border-bottom: 2px solid var(--primary); color: var(--text-muted);">
              <th style="padding: 12px 8px;">FUEL</th>
              <th style="padding: 12px 8px;">Equipamento</th>
              <th style="padding: 12px 8px;">Setor (Local)</th>
              <th style="padding: 12px 8px;">Nº Série</th>
              <th style="padding: 12px 8px;">Crit.</th>
              <th style="padding: 12px 8px;">Empresa</th>
              <th style="padding: 12px 8px; text-align: center;">Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-maquinas">
            <tr><td colspan="7" style="text-align: center; padding: 20px;">Carregando máquinas...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<!-- MODAL AUTORIZAR RELIMPEZA -->
<div id="modal-autorizar" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:28px;width:380px;max-width:95vw;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h3 style="margin:0;font-size:16px;font-weight:800;color:#0f172a;">Autorizar Relimpeza</h3>
      <button onclick="fecharModalAutorizar()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;">✕</button>
    </div>
    <p style="margin:0;font-size:13px;color:#475569;">FUEL: <strong id="autorizar-fuel-label">—</strong></p>
    <input type="hidden" id="autorizar-fuel-val">
    <label style="font-size:12px;font-weight:800;color:#0f172a;text-transform:uppercase;letter-spacing:1px;">Tipo de Relimpeza</label>
    <div style="display:flex;gap:10px;">
      <button id="btn-tipo-filtro" onclick="selecionarTipoAutorizar('FILTRO')" style="flex:1;padding:12px;border:2px solid #d6d6d6;border-radius:8px;background:#fff;font-weight:800;font-size:13px;cursor:pointer;">FILTRO</button>
      <button id="btn-tipo-duto"   onclick="selecionarTipoAutorizar('DUTO')"   style="flex:1;padding:12px;border:2px solid #d6d6d6;border-radius:8px;background:#fff;font-weight:800;font-size:13px;cursor:pointer;">DUTO</button>
    </div>
    <p id="msg-autorizar" style="margin:0;font-size:12px;font-weight:700;min-height:16px;text-align:center;"></p>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button onclick="fecharModalAutorizar()" style="flex:1;padding:12px;border:2px solid #d6d6d6;border-radius:8px;background:#fff;font-weight:700;font-size:13px;cursor:pointer;">Cancelar</button>
      <button id="btn-confirmar-autorizar" onclick="confirmarAutorizar()" style="flex:1;padding:12px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-weight:800;font-size:13px;cursor:pointer;" disabled>Confirmar</button>
    </div>
  </div>
</div>

<!-- MODAL GERENCIAR SETORES -->
<div id="modal-setores" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:28px;width:420px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h3 style="margin:0;font-size:16px;font-weight:800;color:#0f172a;">Gerenciar Setores</h3>
      <button onclick="fecharModalSetores()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;">✕</button>
    </div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="setor-input" placeholder="Ex: HU/UTI 1  ou  HU/CC" class="input-form" style="flex:1;">
      <input type="hidden" id="setor-editando">
      <button onclick="salvarSetorModal()" class="btn-primary" style="white-space:nowrap;padding:0 14px;">Salvar</button>
    </div>
    <p id="msg-setor" style="margin:0;font-size:12px;font-weight:700;min-height:16px;text-align:center;"></p>
    <div id="lista-setores-modal" style="overflow-y:auto;flex:1;border:1px solid #e2e8f0;border-radius:8px;"></div>
  </div>
</div>

<script>
  // valorAtual = localizacao completa ex "HU/CC/SALA 4"
  function carregarSelectSetor(valorAtual) {
    google.script.run
      .withSuccessHandler(function(lista) {
        var sel = document.getElementById('maq_setor');
        // extrai setor e local específico do valor completo
        var setorVal = '', localEsp = '';
        if (valorAtual) {
          var parts = valorAtual.split('/');
          // setor = tudo menos a última parte (se houver mais de 1 parte)
          if (parts.length > 1) {
            localEsp = parts[parts.length - 1].trim();
            setorVal = parts.slice(0, parts.length - 1).join('/').trim();
          } else {
            setorVal = valorAtual.trim();
          }
        } else {
          setorVal = sel.value;
        }
        sel.innerHTML = '<option value="">— Selecione o setor —</option>';
        (lista || []).forEach(function(s) {
          var o = document.createElement('option');
          o.value = s; o.text = s;
          if (s === setorVal) o.selected = true;
          sel.appendChild(o);
        });
        if (localEsp !== '') document.getElementById('maq_local_esp').value = localEsp;
      })
      .getListaSetores();
  }

  function abrirModalSetores() {
    document.getElementById('modal-setores').style.display = 'flex';
    document.getElementById('setor-input').value = '';
    document.getElementById('setor-editando').value = '';
    document.getElementById('msg-setor').textContent = '';
    _carregarListaSetoresModal();
  }

  function fecharModalSetores() {
    document.getElementById('modal-setores').style.display = 'none';
    carregarSelectSetor();
  }

  function _carregarListaSetoresModal() {
    google.script.run
      .withSuccessHandler(function(lista) {
        var div = document.getElementById('lista-setores-modal');
        if (!lista || lista.length === 0) {
          div.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:16px;font-size:13px;">Nenhum setor cadastrado.</p>';
          return;
        }
        div.innerHTML = lista.map(function(s) {
          var es = s.replace(/'/g, "\\'");
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #f1f5f9;">' +
            '<span style="font-size:13px;font-weight:600;color:#1e293b;">' + s + '</span>' +
            '<div style="display:flex;gap:8px;">' +
            '<button onclick="editarSetor(\'' + es + '\')" style="background:none;border:none;color:#0ea5e9;cursor:pointer;font-size:12px;font-weight:700;">Editar</button>' +
            '<button onclick="excluirSetorModal(\'' + es + '\')" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:12px;font-weight:700;">Excluir</button>' +
            '</div></div>';
        }).join('');
      })
      .getListaSetores();
  }

  function editarSetor(nome) {
    document.getElementById('setor-input').value = nome;
    document.getElementById('setor-editando').value = nome;
    document.getElementById('setor-input').focus();
    document.getElementById('msg-setor').textContent = 'Editando: ' + nome;
    document.getElementById('msg-setor').style.color = '#0ea5e9';
  }

  function salvarSetorModal() {
    var nome = document.getElementById('setor-input').value.trim();
    var editando = document.getElementById('setor-editando').value.trim();
    var msg = document.getElementById('msg-setor');
    if (!nome) { msg.textContent = 'Digite um nome.'; msg.style.color = '#dc2626'; return; }
    msg.textContent = 'Salvando...'; msg.style.color = '#64748b';
    google.script.run
      .withSuccessHandler(function(r) {
        msg.textContent = r.msg;
        msg.style.color = r.sucesso ? '#16a34a' : '#dc2626';
        if (r.sucesso) {
          document.getElementById('setor-input').value = '';
          document.getElementById('setor-editando').value = '';
          _carregarListaSetoresModal();
        }
      })
      .salvarSetor(nome, editando || null);
  }

  function excluirSetorModal(nome) {
    if (!confirm('Excluir setor "' + nome + '"?')) return;
    google.script.run
      .withSuccessHandler(function(r) {
        document.getElementById('msg-setor').textContent = r.msg;
        document.getElementById('msg-setor').style.color = r.sucesso ? '#16a34a' : '#dc2626';
        _carregarListaSetoresModal();
      })
      .excluirSetor(nome);
  }

  // Chama ao iniciar o módulo Máquinas
  carregarSelectSetor('');
</script>

<style>

:root {
  /* Paleta Oficial UEL */
  --bg-color: #f0f0ef;
  --sidebar-bg: #00753b;
  --card-bg: #ffffff;
  --primary: #00753b;
  --primary-hover: #0e6c13;
  --primary-light: #e8fde7;
  --text-main: #1d1717;
  --text-muted: #4d4d4d;
  --danger: #ff5722;
}

body, html {
  font-family: 'Barlow', sans-serif;
  background-color: var(--bg-color);
  margin: 0; padding: 0;
  width: 100%; height: 100vh;
  overflow: hidden;
  color: var(--text-main);
  -webkit-font-smoothing: antialiased;
}

#login-wrapper {
  display: flex; height: 100vh; width: 100vw;
  background-size: cover; background-position: center top; position: absolute; z-index: 50;
}

/* ── LOGIN — LADO ESQUERDO ── */
.login-left {
  flex: 1.4; color: white; display: flex; flex-direction: column;
  justify-content: flex-end; padding: 60px 70px; position: relative;
}
.login-left-content { margin-bottom: auto; padding-top: 20vh; }
.login-title {
  font-family: 'Barlow', sans-serif;
  font-size: 110px; font-weight: 900; margin: 0; letter-spacing: -2px;
  color: #ffffff; line-height: 1;
}
.login-subtitle {
  font-family: 'Barlow', sans-serif;
  font-size: 20px; font-weight: 800; color: var(--primary-light);
  margin: 10px 0 20px 0; text-transform: uppercase; letter-spacing: 2px;
}
.login-divider { height: 6px; width: 80px; background: var(--primary); margin-bottom: 20px; border-radius: 0; }
.login-desc {
  font-size: 16px; color: #f0f0ef; line-height: 1.6; max-width: 420px; font-weight: 500; font-family: 'Cuprum', sans-serif;
}
.login-footer {
  font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 800;
  letter-spacing: 1px; text-transform: uppercase; margin-top: 40px;
}

/* ── LOGIN — LADO DIREITO (Tactical Brutalism Box) ── */
.login-right {
  flex: 0 0 420px; display: flex; justify-content: center; align-items: center;
  background: rgba(0, 0, 0, 0.85); /* Fundo rígido escuro sem blur (brutalist) */
  border-left: 6px solid var(--primary);
}
.login-box {
  width: 100%; max-width: 340px; padding: 50px 40px;
  background: transparent; color: white;
}
.login-box h2 { font-family: 'Barlow', sans-serif; margin: 0 0 8px; font-size: 28px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 1px; }
.login-hint { font-family: 'Cuprum', sans-serif; color: rgba(255,255,255,0.7); font-size: 15px; margin-bottom: 32px; }
.login-box label {
  font-family: 'Barlow', sans-serif;
  font-size: 12px; font-weight: 800; color: var(--primary-light);
  text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 8px;
}
.login-box .input-form {
  width: 100%; padding: 14px 16px; border: 2px solid rgba(255,255,255,0.15);
  border-radius: 0; font-family: 'Cuprum', sans-serif; font-size: 16px; background: rgba(255,255,255,0.05);
  color: white; box-sizing: border-box; transition: 0.2s; outline: none; margin-bottom: 20px;
}
.login-box .input-form::placeholder { color: rgba(255,255,255,0.3); font-weight: 600; }
.login-box .input-form:focus {
  border-color: var(--primary); background: rgba(0, 117, 59, 0.1);
}
.login-box .btn-primary {
  background: var(--primary); color: white; border: none; padding: 16px; border-radius: 0;
  font-family: 'Barlow', sans-serif;
  font-size: 15px; font-weight: 900; width: 100%; cursor: pointer; transition: 0.1s;
  text-transform: uppercase; letter-spacing: 2px; margin-top: 10px;
  box-shadow: 4px 4px 0 rgba(255,255,255,0.15);
}
.login-box .btn-primary:hover {
  background: var(--primary-hover);
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 rgba(255,255,255,0.15);
}
.msg-alerta { text-align: center; font-weight: 800; color: var(--danger); font-size: 14px; margin-top: 20px; min-height: 20px; font-family: 'Barlow', sans-serif; }

#tela-dashboard { display: none; height: 100vh; width: 100vw; overflow: hidden; }

.sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; border-right: 4px solid var(--text-main); z-index: 10; border-radius: 0; }
.sidebar-header { padding: 20px; text-align: left; border-bottom: 2px solid rgba(255,255,255,0.1); }
.sidebar-header h2 { font-family: 'Barlow', sans-serif; margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
.sidebar-header p { margin: 5px 0 0 0; font-size: 11px; color: var(--primary-light); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

.sidebar-menu { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; gap: 0; }

.menu-btn {
  background: transparent; color: white; border: none; padding: 14px 20px; border-radius: 0; font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 700; text-align: left;
  cursor: pointer; transition: 0.1s; border-left: 6px solid transparent; text-transform: uppercase; letter-spacing: 1px;
}
.menu-btn:hover { background: var(--primary-hover); color: white; border-left-color: var(--danger); }
.menu-btn.active { background: var(--primary-hover); color: white; border-left-color: var(--primary-light); }

.btn-sair { background: var(--text-main); color: var(--danger); border: none; padding: 18px; cursor: pointer; font-family: 'Barlow', sans-serif; font-weight: 900; font-size: 13px; border-top: 2px solid rgba(255,255,255,0.05); text-transform: uppercase; border-radius: 0; letter-spacing: 1px; }
.btn-sair:hover { background: var(--danger); color: white; }

.main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: var(--bg-color); }
.header-top { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: var(--card-bg); border-bottom: 4px solid var(--text-main); z-index: 5; height: 75px; box-sizing: border-box; }
.header-top h1 { font-family: 'Barlow', sans-serif; margin: 0; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
#boas-vindas { font-family: 'Cuprum', sans-serif; margin: 4px 0 0 0; color: var(--primary); font-weight: 700; font-size: 13px; text-transform: uppercase; }

.clock-container { text-align: right; }
.clock-date { font-family: 'Barlow', sans-serif; font-size: 11px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
.clock-time { font-family: 'Barlow', sans-serif; font-size: 24px; font-weight: 900; color: var(--text-main); letter-spacing: -1px; line-height: 1; }

.modulos-container { padding: 30px; flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }
.modulo-oculto { display: none; height: 100%; flex-direction: column; justify-content: space-evenly; }
#modulo-HOME { display: flex; }

.section-title { font-family: 'Barlow', sans-serif; font-size: 18px; font-weight: 900; color: var(--text-main); margin: 0 0 15px 0; display: flex; align-items: center; text-transform: uppercase; letter-spacing: 1px; }
.section-title::before { content: ''; display: inline-block; width: 12px; height: 12px; background: var(--danger); margin-right: 12px; }

.grid-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 20px; }
.card-stat {
  background: var(--card-bg); border-radius: 0; padding: 20px; border: 2px solid var(--text-main);
  border-top: 6px solid var(--primary); display: flex; flex-direction: column; justify-content: space-between;
  box-shadow: 6px 6px 0 rgba(29, 23, 23, 0.1);
}
.card-stat h4 { font-family: 'Barlow', sans-serif; margin: 0 0 8px 0; font-size: 12px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.card-stat .main-number { font-family: 'Barlow', sans-serif; font-size: 38px; font-weight: 900; margin: 0; color: var(--text-main); line-height: 1; letter-spacing: -2px; }

.stat-group { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 2px solid #e0e0e0; }
.stat-item { text-align: center; flex: 1; }
.stat-num { display: block; font-family: 'Barlow', sans-serif; font-size: 20px; font-weight: 900; color: var(--primary); line-height: 1; }
.stat-label { display: block; font-family: 'Barlow', sans-serif; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }

.form-container {
  background: var(--card-bg);
  padding: 30px;
  border-radius: 0;
  border: 2px solid var(--text-main);
  box-shadow: 6px 6px 0 rgba(29, 23, 23, 0.1);
  border-top: 6px solid var(--primary);
}
.form-container label { font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 800; color: var(--text-main); display: block; margin-bottom: 8px; margin-top: 16px; text-transform: uppercase; letter-spacing: 1px; }
.form-container .input-form { font-family: 'Cuprum', sans-serif; width: 100%; padding: 12px; border: 2px solid #d6d6d6; border-radius: 0; font-size: 15px; font-weight: 600; background: #fafafa; box-sizing: border-box; }
.form-container .input-form:focus { border-color: var(--primary); outline: none; background: white; }

.btn-primary {
  background: var(--primary); color: white; border: 2px solid var(--primary); padding: 14px 24px; border-radius: 0; font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 900;
  cursor: pointer; transition: 0.1s; text-transform: uppercase; letter-spacing: 2px;
  box-shadow: 4px 4px 0 rgba(29, 23, 23, 0.1);
}
.btn-primary:hover {
  background: var(--primary-hover); border-color: var(--primary-hover);
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 rgba(29, 23, 23, 0.1);
}

/* Tabelas e Data Grids (Tactical Brutalism) */
table { width: 100%; border-collapse: collapse; border: 2px solid var(--text-main); background: var(--card-bg); font-family: 'Cuprum', sans-serif;}
th { background: var(--sidebar-bg); color: white; padding: 14px 10px; font-family: 'Barlow', sans-serif; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border: 2px solid var(--text-main); border-bottom: 4px solid var(--text-main); }
td { padding: 12px 10px; border: 1px solid #d6d6d6; border-bottom: 2px solid #d6d6d6; color: var(--text-main); font-size: 15px; font-weight: 600; }
tr:hover td { background-color: var(--primary-light); color: var(--text-main); }

@keyframes hud-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.hud-loader { display: inline-block; animation: hud-blink 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; color: var(--primary); font-family: 'Courier New', Courier, monospace; font-size: 14px; letter-spacing: 2px; font-weight: 900; }

</style>

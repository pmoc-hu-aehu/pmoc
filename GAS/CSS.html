<style>

@import url('https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Barlow:wght@700;800;900&display=swap');

/* ══════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════ */
:root {
  /* Green Identity */
  --green-50:   #F0FAF3;
  --green-100:  #DBEEE1;
  --green-200:  #B9DEC5;
  --green-300:  #8FCF88;
  --green-400:  #5DB87A;
  --green-500:  #3A9659;
  --green-600:  #2A7444;
  --green-700:  #1C5230;

  /* Teal — acento técnico */
  --teal-400:   #0891B2;
  --teal-500:   #0E7490;

  /* Tokens principais */
  --primary:        var(--green-300);
  --primary-hover:  var(--green-400);
  --primary-dark:   var(--green-500);
  --primary-deeper: var(--green-600);
  --primary-text:   var(--green-700);
  --primary-light:  var(--green-50);
  --primary-mid:    var(--green-200);

  /* Superfícies */
  --bg:         #F3F5F8;
  --surface:    #FFFFFF;
  --surface-2:  #F8F9FB;
  --surface-3:  #F1F4F7;

  /* Bordas */
  --border:     #E4E8EE;
  --border-md:  #CDD3DB;

  /* Texto — contraste WCAG AA */
  --text-1:     #1A2332;   /* 14.5:1 on white */
  --text-2:     #4A5568;   /* 7.0:1  on white */
  --text-3:     #718096;   /* 4.6:1  on white ≥ AA */
  --text-inv:   #FFFFFF;

  /* Status semânticos */
  --red:          #C53030;
  --red-bg:       #FFF5F5;
  --red-border:   #FEB2B2;
  --orange:       #C05621;
  --orange-bg:    #FFFAF0;
  --orange-border:#FBD38D;
  --blue:         #2B6CB0;
  --blue-bg:      #EBF8FF;
  --blue-border:  #90CDF4;

  /* Shadows */
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 6px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.05);

  /* Geometry */
  --r-sm:   4px;
  --r:      8px;
  --r-lg:   12px;
  --r-xl:   16px;
  --r-full: 9999px;

  /* Motion */
  --t-fast:   120ms ease;
  --t:        160ms ease;
  --t-slow:   240ms ease;
}

/* ══════════════════════════════════════
   RESET
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Fira Sans', 'Inter', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-1);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Focus visível para acessibilidade (WCAG) */
:focus-visible {
  outline: 3px solid var(--green-300);
  outline-offset: 2px;
  border-radius: var(--r-sm);
}

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */

#login-wrapper {
  display: flex;
  height: 100vh;
  width: 100vw;
  background: #0A1628;
  position: absolute;
  z-index: 50;
  background-size: cover;
  background-position: center;
}

.login-left {
  flex: 1;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 64px 80px;
}

.login-title {
  font-family: 'Barlow', sans-serif;
  font-size: 96px;
  font-weight: 900;
  letter-spacing: -4px;
  line-height: 0.9;
  color: #fff;
}

.login-subtitle {
  font-size: 11px;
  font-weight: 600;
  color: var(--green-300);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin: 20px 0 16px;
}

.login-divider {
  width: 40px;
  height: 3px;
  background: var(--green-300);
  border-radius: 2px;
  margin-bottom: 20px;
}

.login-desc {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  line-height: 1.8;
  max-width: 360px;
}

.login-footer {
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 56px;
}

.login-right {
  flex: 0 0 420px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-left: 1px solid rgba(255,255,255,0.08);
}

.login-box {
  width: 100%;
  max-width: 340px;
  padding: 48px 40px;
}

.login-box h2 {
  font-family: 'Barlow', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.login-hint {
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  margin-bottom: 36px;
}

.login-box label {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  display: block;
  margin-bottom: 8px;
}

.login-box .input-form {
  width: 100%;
  padding: 13px 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--r-sm);
  font-family: 'Fira Sans', sans-serif;
  font-size: 15px;
  color: #fff;
  outline: none;
  transition: border-color var(--t), background var(--t), box-shadow var(--t);
  margin-bottom: 20px;
  min-height: 44px; /* touch target */
}

.login-box .input-form::placeholder { color: rgba(255,255,255,0.2); }

.login-box .input-form:focus {
  border-color: var(--green-300);
  background: rgba(143,207,136,0.08);
  box-shadow: 0 0 0 3px rgba(143,207,136,0.2);
}

.login-box .btn-primary {
  width: 100%;
  min-height: 44px;
  padding: 13px;
  background: var(--green-300);
  color: var(--green-700);
  border: none;
  border-radius: var(--r-sm);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  transition: background var(--t), transform var(--t-fast), box-shadow var(--t);
  margin-top: 8px;
  box-shadow: 0 2px 8px rgba(143,207,136,0.35);
}

.login-box .btn-primary:hover {
  background: var(--green-400);
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(143,207,136,0.45);
}

.login-box .btn-primary:active { transform: none; }

.msg-alerta {
  text-align: center;
  font-weight: 600;
  color: #FC8181;
  font-size: 13px;
  margin-top: 16px;
  min-height: 20px;
}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */

#tela-dashboard {
  display: none;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ══════════════════════════════════════
   SIDEBAR — branca, SVG icons, WCAG AA
══════════════════════════════════════ */

.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  z-index: 10;
}

.sidebar-header {
  padding: 18px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-logo {
  width: 36px;
  height: 36px;
  background: var(--green-300);
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.sidebar-brand h2 {
  font-family: 'Barlow', sans-serif;
  font-size: 16px;
  font-weight: 800;
  color: var(--text-1);
  letter-spacing: -0.3px;
  line-height: 1.1;
}

.sidebar-brand p {
  font-size: 10px;
  color: var(--text-3);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

.sidebar-menu {
  flex: 1;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  overflow-y: auto;
}

.sidebar-menu::-webkit-scrollbar { width: 3px; }
.sidebar-menu::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.menu-category {
  font-family: 'Fira Sans', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 14px 8px 4px;
  display: block;
  background: none;
  border: none;
  text-align: left;
  width: 100%;
  cursor: default;
}

.menu-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  min-height: 40px;
  padding: 9px 10px;
  background: none;
  border: none;
  border-radius: var(--r-sm);
  font-family: 'Fira Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast);
  text-align: left;
}

.menu-btn .menu-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.5;
  transition: opacity var(--t-fast);
  color: currentColor;
}

.menu-btn:hover {
  background: var(--green-50);
  color: var(--green-600);
}

.menu-btn:hover .menu-icon { opacity: 0.8; }

.menu-btn.active {
  background: var(--green-50);
  color: var(--green-600);
  font-weight: 600;
  border-left: 3px solid var(--green-400);
  padding-left: 7px;
}

.menu-btn.active .menu-icon { opacity: 1; }

.btn-sair {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  min-height: 44px;
  padding: 14px 18px;
  background: none;
  border: none;
  border-top: 1px solid var(--border);
  font-family: 'Fira Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast);
}

.btn-sair:hover {
  background: var(--red-bg);
  color: var(--red);
}

/* ══════════════════════════════════════
   TOPBAR
══════════════════════════════════════ */

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
  min-width: 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 60px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  box-shadow: var(--shadow-xs);
  gap: 20px;
}

.header-top h1 {
  font-family: 'Barlow', sans-serif;
  font-size: 16px;
  font-weight: 800;
  color: var(--text-1);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

#boas-vindas {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 2px;
  font-weight: 400;
}

.clock-container { text-align: right; flex-shrink: 0; }

.clock-date {
  font-size: 10px;
  color: var(--text-3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.clock-time {
  font-family: 'Barlow', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--text-1);
  letter-spacing: -1px;
  line-height: 1.1;
}

.modulos-container {
  padding: 24px 28px;
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.modulo-oculto { display: none; height: 100%; flex-direction: column; }
#modulo-HOME   { display: flex; }

/* ══════════════════════════════════════
   SECTION TITLE
══════════════════════════════════════ */

.section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Fira Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 0 0 16px;
}

.section-title::before {
  content: '';
  width: 3px;
  height: 12px;
  background: var(--green-300);
  border-radius: 2px;
  flex-shrink: 0;
}

/* ══════════════════════════════════════
   KPI CARDS
══════════════════════════════════════ */

.grid-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.card-stat {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 20px 22px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--t), transform var(--t);
  position: relative;
  overflow: hidden;
  cursor: default;
}

.card-stat:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

/* Chip verde esquerda */
.card-stat::before {
  content: '';
  position: absolute;
  left: 0; top: 18%; bottom: 18%;
  width: 3px;
  background: var(--green-300);
  border-radius: 0 2px 2px 0;
}

/* Orbe decorativa */
.card-stat::after {
  content: '';
  position: absolute;
  top: -24px; right: -24px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--green-50);
  pointer-events: none;
}

.card-stat h4 {
  font-family: 'Fira Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}

.card-stat .main-number {
  font-family: 'Barlow', sans-serif;
  font-size: 44px;
  font-weight: 900;
  letter-spacing: -2px;
  color: var(--text-1);
  line-height: 1;
  position: relative;
  z-index: 1;
}

.stat-group {
  display: flex;
  justify-content: space-between;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.stat-item { text-align: center; flex: 1; }

.stat-num {
  display: block;
  font-family: 'Barlow', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--green-500);
  line-height: 1;
}

.stat-label {
  display: block;
  font-family: 'Fira Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}

/* ══════════════════════════════════════
   FORM CONTAINER
══════════════════════════════════════ */

.form-container {
  background: var(--surface);
  padding: 24px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.form-container h4 {
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: var(--text-1);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 16px;
}

.form-container label {
  font-family: 'Fira Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 1px;
  display: block;
  margin: 14px 0 6px;
}

.form-container .input-form {
  width: 100%;
  min-height: 40px;
  padding: 9px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border-md);
  border-radius: var(--r-sm);
  font-family: 'Fira Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--text-1);
  outline: none;
  transition: border-color var(--t), box-shadow var(--t), background var(--t);
}

.form-container .input-form:focus {
  border-color: var(--green-300);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(143,207,136,0.2);
}

.form-container .input-form::placeholder {
  color: var(--text-3);
  font-size: 13px;
}

/* ══════════════════════════════════════
   BOTÕES — cursor:pointer + 44px min
══════════════════════════════════════ */

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 38px;
  background: var(--green-300);
  color: var(--green-700);
  border: none;
  padding: 9px 18px;
  border-radius: var(--r-sm);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background var(--t), transform var(--t-fast), box-shadow var(--t);
  box-shadow: 0 1px 4px rgba(93,184,122,0.25);
  white-space: nowrap;
}

.btn-primary:hover {
  background: var(--green-400);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(93,184,122,0.35);
}

.btn-primary:active { transform: none; }

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 38px;
  background: var(--surface);
  color: var(--text-2);
  border: 1px solid var(--border-md);
  padding: 9px 18px;
  border-radius: var(--r-sm);
  font-family: 'Fira Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast);
}

.btn-secondary:hover {
  background: var(--surface-3);
  color: var(--text-1);
}

/* ══════════════════════════════════════
   TABELAS — WCAG AA
══════════════════════════════════════ */

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  font-family: 'Fira Sans', sans-serif;
  font-size: 13px;
}

thead tr { background: var(--surface-2); }

th {
  padding: 10px 14px;
  font-family: 'Fira Sans', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  background: var(--surface-2);
}

td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text-1);
  font-size: 13px;
  vertical-align: middle;
  line-height: 1.4;
}

tbody tr:last-child td { border-bottom: none; }

tbody tr { transition: background var(--t-fast); }

tbody tr:hover td { background: var(--green-50); }

/* ══════════════════════════════════════
   BADGES — pill semânticos com dot
══════════════════════════════════════ */

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: var(--r-full);
  font-family: 'Fira Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2px;
  white-space: nowrap;
}

.badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.badge-success {
  background: var(--green-100);
  color: var(--green-600);
  border: 1px solid var(--green-200);
}
.badge-success::before { background: var(--green-400); }

.badge-warning {
  background: var(--orange-bg);
  color: var(--orange);
  border: 1px solid var(--orange-border);
}
.badge-warning::before { background: var(--orange); }

.badge-danger {
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid var(--red-border);
}
.badge-danger::before { background: var(--red); }

.badge-info {
  background: var(--blue-bg);
  color: var(--blue);
  border: 1px solid var(--blue-border);
}
.badge-info::before { background: var(--blue); }

.badge-muted {
  background: var(--surface-2);
  color: var(--text-3);
  border: 1px solid var(--border);
}
.badge-muted::before { background: var(--text-3); }

/* ══════════════════════════════════════
   LOADER — sem emojis, animação sutil
══════════════════════════════════════ */

@keyframes dot-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.3; transform: scale(0.8); }
}

.hud-loader {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text-3);
  font-family: 'Fira Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
}

.hud-loader::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green-300);
  animation: dot-pulse 1.4s ease-in-out infinite;
}

/* ══════════════════════════════════════
   MODAIS
══════════════════════════════════════ */

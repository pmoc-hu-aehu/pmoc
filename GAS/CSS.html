<style>

@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Cuprum:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  /* Superfícies */
  --bg:             #f4f6f8;
  --surface:        #ffffff;
  --surface-2:      #fbfcfd;
  --border:         #e4e8ee;
  --border-strong:  #cdd3dc;

  /* Texto */
  --text:    #10161e;
  --text-2:  #41505f;
  --muted:   #6b7889;
  --muted-2: #95a0b0;

  /* Marca — verde-petróleo */
  --accent:      #0d7d8a;
  --accent-soft: #e2f1f3;
  --accent-ink:  #06535d;
  --accent-mid:  #34d399;

  /* Status */
  --success:      #2d8a5d; --success-soft: #e2f3ea;
  --warning:      #b6720b; --warning-soft: #fbf0d9;
  --danger:       #b8392e; --danger-soft:  #f8e1de;
  --info:         #2f6cb5; --info-soft:    #e1ecf8;
  --neutral:      #546070; --neutral-soft: #eef0f3;

  /* Sidebar dark */
  --sidebar-bg:   #0e1a26;
  --sidebar-line: #1a2837;
  --sidebar-text: #c8d1de;
  --sidebar-muted:#6b7d92;
  --sidebar-hover:#182634;
  --sidebar-active:#182634;

  /* Geometria */
  --r:     6px;
  --r-lg:  10px;
  --r-xl:  14px;

  /* Sombras */
  --shadow-xs: 0 1px 2px rgba(15,23,35,.04);
  --shadow-sm: 0 1px 3px rgba(15,23,35,.06), 0 1px 6px rgba(15,23,35,.04);
  --shadow-md: 0 6px 18px rgba(15,23,35,.08), 0 1px 2px rgba(15,23,35,.04);
  --shadow-lg: 0 24px 48px rgba(15,23,35,.18), 0 2px 6px rgba(15,23,35,.08);

  /* Layout */
  --sidebar-w: 240px;
  --topbar-h:  60px;
  --row-h:     44px;

  /* Transições */
  --t: 140ms ease;
}

/* ══════════════════════════════════════
   RESET
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Barlow', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--r);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */

#login-wrapper {
  display: flex;
  height: 100vh;
  width: 100vw;
  background: #070f18;
  position: absolute;
  z-index: 50;
  background-size: cover;
  background-position: center;
}

.login-left {
  flex: 1;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 64px 80px;
}

.login-title {
  font-family: 'Cuprum', sans-serif;
  font-size: 84px;
  font-weight: 700;
  letter-spacing: -3px;
  line-height: 0.92;
  color: #fff;
}

.login-subtitle {
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-mid);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin: 18px 0 14px;
}

.login-divider {
  width: 48px;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
  margin-bottom: 20px;
}

.login-desc {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  line-height: 1.75;
  max-width: 380px;
}

.login-footer {
  font-size: 11px;
  color: rgba(255,255,255,0.22);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 52px;
}

.login-right {
  flex: 0 0 420px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  width: 380px;
  padding: 36px 32px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: var(--r-xl);
}

.login-box h2 {
  font-family: 'Cuprum', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
}

.login-hint {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 32px;
}

.login-box label {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  display: block;
  margin-bottom: 7px;
}

.login-box .input-form {
  width: 100%;
  height: var(--row-h);
  padding: 0 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: var(--r);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  color: #fff;
  outline: none;
  transition: border-color var(--t), background var(--t), box-shadow var(--t);
  margin-bottom: 18px;
}

.login-box .input-form::placeholder { color: rgba(255,255,255,0.25); }

.login-box .input-form:focus {
  border-color: var(--accent);
  background: rgba(13,125,138,0.12);
  box-shadow: 0 0 0 3px rgba(13,125,138,0.2);
}

.login-box .btn-primary {
  width: 100%;
  height: var(--row-h);
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: background var(--t), transform var(--t), box-shadow var(--t);
  margin-top: 8px;
  box-shadow: 0 2px 8px rgba(13,125,138,0.35);
}

.login-box .btn-primary:hover {
  background: var(--accent-ink);
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(13,125,138,0.4);
}

.login-box .btn-primary:active { transform: none; }

.msg-alerta {
  text-align: center;
  font-weight: 600;
  color: #fc8181;
  font-size: 13px;
  margin-top: 14px;
  min-height: 20px;
}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */

#tela-dashboard {
  display: none;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ══════════════════════════════════════
   SIDEBAR — dark navy
══════════════════════════════════════ */

.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  border-right: 1px solid var(--sidebar-line);
  z-index: 10;
}

.sidebar-header {
  padding: 18px 16px;
  border-bottom: 1px solid var(--sidebar-line);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-logo {
  width: 34px;
  height: 34px;
  background: var(--accent);
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.sidebar-brand h2 {
  font-family: 'Cuprum', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  line-height: 1.1;
  letter-spacing: -0.3px;
}

.sidebar-brand p {
  font-size: 10px;
  color: var(--sidebar-muted);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

.sidebar-menu {
  flex: 1;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  overflow-y: auto;
}

.sidebar-menu::-webkit-scrollbar { width: 3px; }
.sidebar-menu::-webkit-scrollbar-thumb {
  background: var(--sidebar-line);
  border-radius: 2px;
}

.menu-category {
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--sidebar-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 16px 8px 5px;
  display: block;
  background: none;
  border: none;
  text-align: left;
  width: 100%;
  cursor: default;
}

.menu-btn {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  height: 38px;
  padding: 0 10px;
  background: none;
  border: none;
  border-left: 3px solid transparent;
  border-radius: 0 var(--r) var(--r) 0;
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--sidebar-text);
  cursor: pointer;
  transition: background var(--t), color var(--t), border-color var(--t);
  text-align: left;
  appearance: none;
  -webkit-appearance: none;
  box-shadow: none;
  outline: none;
}

.menu-btn .menu-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  opacity: 0.45;
  transition: opacity var(--t);
  color: currentColor;
}

.menu-btn:hover {
  background: var(--sidebar-hover);
  color: #fff;
  border-left-color: rgba(13,125,138,0.4);
}

.menu-btn:hover .menu-icon { opacity: 0.7; }

.menu-btn.active {
  background: var(--sidebar-active);
  color: #fff;
  font-weight: 600;
  border-left-color: var(--accent);
}

.menu-btn.active .menu-icon { opacity: 1; }

.btn-sair {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  height: var(--row-h);
  padding: 0 18px;
  background: none;
  border: none;
  border-top: 1px solid var(--sidebar-line);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--sidebar-muted);
  cursor: pointer;
  transition: background var(--t), color var(--t);
  text-align: left;
}

.btn-sair:hover {
  background: rgba(184,57,46,0.12);
  color: #fc8181;
}

/* ══════════════════════════════════════
   TOPBAR
══════════════════════════════════════ */

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
  min-width: 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  box-shadow: var(--shadow-xs);
  gap: 16px;
}

.header-top h1 {
  font-family: 'Cuprum', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
  white-space: nowrap;
}

#boas-vindas {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  font-weight: 400;
}

.clock-container { text-align: right; flex-shrink: 0; }

.clock-date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted-2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.clock-time {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 19px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1.1;
}

.modulos-container {
  padding: 24px 28px;
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.modulo-oculto { display: none; height: 100%; flex-direction: column; }
#modulo-HOME   { display: flex; }

/* ══════════════════════════════════════
   SECTION TITLE
══════════════════════════════════════ */

.section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Barlow', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin: 0 0 16px;
}

.section-title::before {
  content: '';
  width: 3px;
  height: 12px;
  background: var(--accent);
  border-radius: 2px;
  flex-shrink: 0;
}

/* ══════════════════════════════════════
   KPI CARDS
══════════════════════════════════════ */

.grid-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 22px;
}

.card-stat {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 20px 20px 18px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--t), transform var(--t);
  position: relative;
  overflow: hidden;
  cursor: default;
}

.card-stat:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.card-stat::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.card-stat h4 {
  font-family: 'Barlow', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.card-stat .main-number {
  font-family: 'Cuprum', sans-serif;
  font-size: 42px;
  font-weight: 700;
  letter-spacing: -1.5px;
  color: var(--text);
  line-height: 1;
  margin-bottom: 0;
}

.stat-group {
  display: flex;
  justify-content: space-between;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.stat-item { text-align: center; flex: 1; }

.stat-num {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 19px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
}

.stat-label {
  display: block;
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted-2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}

/* ══════════════════════════════════════
   CARD GENÉRICO
══════════════════════════════════════ */

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

.card__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
}

.card__head h3 {
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.card__body { padding: 18px; }

/* ══════════════════════════════════════
   FORM CONTAINER
══════════════════════════════════════ */

.form-container {
  background: var(--surface);
  padding: 22px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.form-container h4 {
  font-family: 'Cuprum', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
  letter-spacing: -0.2px;
}

.form-container label {
  font-family: 'Barlow', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 1px;
  display: block;
  margin: 14px 0 6px;
}

.form-container .input-form {
  width: 100%;
  height: 36px;
  padding: 0 11px;
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  border-radius: var(--r);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  outline: none;
  transition: border-color var(--t), box-shadow var(--t), background var(--t);
  appearance: none;
}

.form-container .input-form:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(13,125,138,0.15);
}

.form-container .input-form::placeholder {
  color: var(--muted-2);
  font-size: 13px;
}

/* ══════════════════════════════════════
   BOTÕES
══════════════════════════════════════ */

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 34px;
  padding: 0 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r);
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background var(--t), transform var(--t), box-shadow var(--t);
  box-shadow: 0 1px 4px rgba(13,125,138,0.25);
  white-space: nowrap;
}

.btn-primary:hover {
  background: var(--accent-ink);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(13,125,138,0.35);
}

.btn-primary:active { transform: none; }

.btn-primary:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 34px;
  padding: 0 16px;
  background: var(--surface);
  color: var(--text-2);
  border: 1px solid var(--border-strong);
  border-radius: var(--r);
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--t), color var(--t), border-color var(--t);
  white-space: nowrap;
}

.btn-secondary:hover {
  background: var(--bg);
  color: var(--text);
}

/* ══════════════════════════════════════
   INPUTS / SELECTS GLOBAIS
══════════════════════════════════════ */

.input {
  height: 34px;
  padding: 0 11px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--r);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color var(--t), box-shadow var(--t);
  appearance: none;
}

.input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(13,125,138,0.15);
}

/* ══════════════════════════════════════
   TABELAS DENSAS
══════════════════════════════════════ */

table, table.data {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
}

thead tr { background: var(--surface-2); }

th {
  padding: 10px 14px;
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: left;
  border-bottom: 1px solid var(--border-strong);
  background: var(--surface-2);
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 1;
}

td {
  padding: 0 14px;
  height: var(--row-h);
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  vertical-align: middle;
  line-height: 1.4;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background var(--t); }
tbody tr:hover td { background: var(--accent-soft); }

/* ══════════════════════════════════════
   PÍLULAS DE STATUS (.pill)
══════════════════════════════════════ */

.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 999px;
  font-family: 'Barlow', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2px;
  white-space: nowrap;
}

.pill::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Legacy .badge → mapeia para .pill */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.pill--ok,    .badge-success { background: var(--success-soft); color: var(--success); border: 1px solid #b5dbc8; }
.pill--ok::before,    .badge-success::before { background: var(--success); }

.pill--warn,  .badge-warning { background: var(--warning-soft); color: var(--warning); border: 1px solid #f3d49a; }
.pill--warn::before,  .badge-warning::before { background: var(--warning); }

.pill--bad,   .badge-danger  { background: var(--danger-soft);  color: var(--danger);  border: 1px solid #f0b9b4; }
.pill--bad::before,   .badge-danger::before  { background: var(--danger); }

.pill--info,  .badge-info    { background: var(--info-soft);    color: var(--info);    border: 1px solid #a8c9ef; }
.pill--info::before,  .badge-info::before    { background: var(--info); }

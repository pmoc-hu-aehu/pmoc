<div id="modulo-PMOC" class="modulo-oculto">

  <style>
    .rchip { padding:6px 12px; border-radius:20px; border:2px solid; font-size:11px; font-weight:700; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .rchip-on  { background:#2e7d32; border-color:#2e7d32; color:white; }
    .rchip-off { background:white;   border-color:#e2e8f0; color:#64748b; }

    .pmoc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .pmoc-header h2 { font-size:22px; font-weight:800; color:var(--text-main); margin:0; }
    .pmoc-header p  { color:var(--text-muted); margin:4px 0 0; font-size:13px; }

    .pmoc-toolbar {
      display:flex; gap:12px; align-items:flex-end;
      background:#fff; border-radius:12px; padding:20px;
      box-shadow:0 1px 4px rgba(0,0,0,0.07); margin-bottom:24px; flex-wrap:wrap;
    }
    .pmoc-toolbar .cg { display:flex; flex-direction:column; gap:4px; }
    .pmoc-toolbar label { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.8px; }
    .pmoc-toolbar select,
    .pmoc-toolbar input[type="number"] {
      padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px;
      font-size:14px; color:var(--text-main); background:#f8fafc; outline:none; transition:.2s;
    }
    .pmoc-toolbar select:focus,
    .pmoc-toolbar input:focus { border-color:var(--primary); background:#fff; box-shadow:0 0 0 3px rgba(14,165,233,.15); }

    .pmoc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; margin-bottom:24px; }
    .pmoc-card {
      background:#fff; border-radius:12px; border:1.5px solid #e2e8f0;
      padding:16px; transition:.2s; position:relative; overflow:hidden;
    }
    .pmoc-card:hover { border-color:var(--primary); box-shadow:0 4px 12px rgba(14,165,233,.1); }
    .pmoc-card-vazia { opacity:.55; }
    .pmoc-card-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .pmoc-fuel-badge { background:#0f172a; color:#0ea5e9; font-size:11px; font-weight:800; padding:3px 9px; border-radius:6px; }
    .pmoc-card-loc { font-size:12px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
    .pmoc-card-modelo { font-size:13px; font-weight:600; color:var(--text-main); margin-bottom:8px; }
    .pmoc-card-empresa { font-size:10px; color:#0369a1; background:#e0f2fe; padding:2px 8px; border-radius:10px; display:inline-block; margin-bottom:8px; }
    .pmoc-badges { display:flex; gap:5px; flex-wrap:wrap; }
    .pmoc-badge { display:flex; align-items:center; gap:3px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
    .pmoc-badge.filtro { background:#e0f2fe; color:#0369a1; }
    .pmoc-badge.duto   { background:#ede9fe; color:#7c3aed; }
    .pmoc-badge.prev   { background:#dcfce7; color:#16a34a; }
    .pmoc-badge.corr   { background:#fee2e2; color:#dc2626; }
    .pmoc-badge.zero   { background:#f1f5f9; color:#94a3b8; }
    .pmoc-sem-reg      { position:absolute; top:8px; right:10px; font-size:10px; color:#94a3b8; }

    .pmoc-stats {
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
      background:#fff; padding:14px 20px; border-radius:12px;
      border:1.5px solid #e2e8f0; margin-bottom:20px;
    }
    .stat-box { background:#f8fafc; border-radius:10px; padding:10px 18px; text-align:center; border:1px solid #e2e8f0; min-width:80px; }
    .stat-box .val { font-size:20px; font-weight:800; color:var(--text-main); }
    .stat-box .lab { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.4px; }
    #pmoc-status { flex:1; text-align:right; font-size:13px; color:var(--text-muted); }

    .pmoc-dict { background:#fff; border-radius:12px; border:1.5px solid #e2e8f0; padding:20px; margin-bottom:24px; }
    .pmoc-dict h3 { font-size:14px; font-weight:700; margin:0 0 14px; }
    .dict-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .dict-tab { padding:5px 14px; border-radius:8px; border:1.5px solid #e2e8f0; background:#f8fafc; font-size:12px; font-weight:700; cursor:pointer; transition:.2s; color:var(--text-muted); }
    .dict-tab.active { background:#0f172a; color:#0ea5e9; border-color:#0f172a; }
    .dict-content { display:none; }
    .dict-content.on { display:block; }
    .dict-tbl { width:100%; border-collapse:collapse; }
    .dict-tbl th { background:#f1f5f9; font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; padding:8px 12px; text-align:left; }
    .dict-tbl td { padding:7px 12px; border-bottom:1px solid #f1f5f9; font-size:12px; }
    .dict-tbl tr:last-child td { border-bottom:none; }
    .tag-bool { background:#dcfce7; color:#16a34a; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; }
    .tag-med  { background:#dbeafe; color:#2563eb; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; }
    .tag-txt  { background:#fef9c3; color:#a16207; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; }
  </style>

  <div class="pmoc-header">
    <div>
      <h2>Documentação PMOC</h2>
      <p>Todas as máquinas do período selecionado — assinatura do engenheiro responsável</p>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="pmoc-toolbar">
    <div class="cg" style="flex:1;min-width:200px">
      <label>Engenheiro Responsável</label>
      <select id="pmoc-engenheiro" style="width:100%">
        <option value="">— Selecione o engenheiro —</option>
      </select>
    </div>
    <div class="cg">
      <label>Mês</label>
      <select id="pmoc-mes">
        <option value="1">Janeiro</option><option value="2">Fevereiro</option>
        <option value="3">Março</option><option value="4">Abril</option>
        <option value="5">Maio</option><option value="6">Junho</option>
        <option value="7">Julho</option><option value="8">Agosto</option>
        <option value="9">Setembro</option><option value="10">Outubro</option>
        <option value="11">Novembro</option><option value="12">Dezembro</option>
      </select>
    </div>
    <div class="cg">
      <label>Ano</label>
      <input type="number" id="pmoc-ano" value="2025" min="2023" max="2035" style="width:90px">
    </div>
    <button class="btn-primary" onclick="pmocCarregar()" style="height:40px;padding:0 20px">
      🔍 Carregar
    </button>
    <div style="flex:1"></div>
    <button class="btn-primary" onclick="pmocGerarPdf()" style="height:40px;padding:0 22px;background:#16a34a">
      📄 Gerar PMOC PDF
    </button>
  </div>

  <!-- SETOR COLAPSÁVEL -->
  <div style="background:#fff;border-radius:12px;padding:14px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.07);margin-bottom:24px;">
    <button onclick="pmocTogglePainel()" id="pmoc-btn-setor"
      style="display:flex;align-items:center;gap:6px;background:#f1f5f9;border:2px solid #e2e8f0;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;color:#475569;cursor:pointer;width:100%;text-align:left;transition:.2s;">
      🏥 SETOR
      <span id="pmoc-setor-badge" style="background:#2e7d32;color:white;border-radius:10px;padding:1px 8px;font-size:10px;display:none;"></span>
      <span id="pmoc-setor-arrow" style="margin-left:auto;font-size:14px;">▼</span>
    </button>
    <div id="pmoc-painel-setores" style="display:none;margin-top:10px;">
      <div style="font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">Múltipla escolha</div>
      <div id="pmoc-chips-setor" style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="rchip rchip-on" id="pmoc-chip-todos" onclick="pmocToggleSetor(this,'')">🏥 Todos</button>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div id="pmoc-stats" class="pmoc-stats" style="display:none">
    <div class="stat-box"><div class="val" id="st-maq">0</div><div class="lab">Máquinas</div></div>
    <div class="stat-box"><div class="val" id="st-reg" style="color:#16a34a">0</div><div class="lab">Com registro</div></div>
    <div class="stat-box"><div class="val" id="st-fil" style="color:#0369a1">0</div><div class="lab">Filtros</div></div>
    <div class="stat-box"><div class="val" id="st-dut" style="color:#7c3aed">0</div><div class="lab">Dutos</div></div>
    <div class="stat-box"><div class="val" id="st-pre" style="color:#16a34a">0</div><div class="lab">Preventivas</div></div>
    <div class="stat-box"><div class="val" id="st-cor" style="color:#dc2626">0</div><div class="lab">Corretivas</div></div>
    <div class="stat-box"><div class="val" id="st-exa" style="color:#d97706">0</div><div class="lab">Exaustão</div></div>
    <div class="stat-box"><div class="val" id="st-prs" style="color:#0891b2">0</div><div class="lab">Pressão</div></div>
    <div class="stat-box"><div class="val" id="st-qar" style="color:#059669">0</div><div class="lab">Qualidade Ar</div></div>
    <div class="stat-box"><div class="val" id="st-mov" style="color:#9333ea">0</div><div class="lab">Movimentação</div></div>
    <div id="pmoc-status"></div>
  </div>

  <!-- GRID DE MÁQUINAS -->
  <div id="pmoc-grid" class="pmoc-grid"></div>

  <!-- DICIONÁRIO -->
  <div class="pmoc-dict">
    <h3>📋 Perguntas que aparecem no documento</h3>
    <div class="dict-tabs">
      <button class="dict-tab active" onclick="dictTab('filtro',this)">Filtros</button>
      <button class="dict-tab" onclick="dictTab('duto',this)">Dutos</button>
      <button class="dict-tab" onclick="dictTab('preventiva',this)">Preventiva</button>
      <button class="dict-tab" onclick="dictTab('corretiva',this)">Corretiva</button>
      <button class="dict-tab" onclick="dictTab('exaustao',this)">Exaustão</button>
      <button class="dict-tab" onclick="dictTab('pressao',this)">Pressão</button>
      <button class="dict-tab" onclick="dictTab('qualidadeAr',this)">Qualidade Ar</button>
      <button class="dict-tab" onclick="dictTab('movimentacao',this)">Movimentação</button>
    </div>
    <div id="dict-filtro"       class="dict-content on"></div>
    <div id="dict-duto"         class="dict-content"></div>
    <div id="dict-preventiva"   class="dict-content"></div>
    <div id="dict-corretiva"    class="dict-content"></div>
    <div id="dict-exaustao"     class="dict-content"></div>
    <div id="dict-pressao"      class="dict-content"></div>
    <div id="dict-qualidadeAr"  class="dict-content"></div>
    <div id="dict-movimentacao" class="dict-content"></div>
  </div>

  <script>
    // Init
    (function() {
      var d = new Date();
      document.getElementById('pmoc-mes').value = d.getMonth() + 1;
      document.getElementById('pmoc-ano').value = d.getFullYear();

      // Carrega engenheiros
      google.script.run
        .withSuccessHandler(function(lista) {
          var sel = document.getElementById('pmoc-engenheiro');
          (lista || []).forEach(function(e) {
            var o = document.createElement('option');
            o.value = e.id;
            o.text  = e.nome + (e.crea ? ' — CREA: ' + e.crea : '');
            sel.appendChild(o);
          });
        })
        .withFailureHandler(function(){})
        .getListaEngenheiros();

      // Carrega chips de setor
      google.script.run
        .withSuccessHandler(function(lista) {
          var container = document.getElementById('pmoc-chips-setor');
          (lista || []).forEach(function(s) {
            var btn = document.createElement('button');
            btn.className = 'rchip rchip-off';
            btn.textContent = s;
            btn.onclick = function() { pmocToggleSetor(btn, s); };
            container.appendChild(btn);
          });
        })
        .getListaSetores();

      // Carrega dicionário
      google.script.run
        .withSuccessHandler(function(dict) {
          ['filtro','duto','preventiva','corretiva','exaustao','pressao','qualidadeAr','movimentacao'].forEach(function(tipo) {
            var items = dict[tipo] || [];
            var html = '<table class="dict-tbl"><thead><tr><th>#</th><th>Pergunta no Documento</th><th>Resposta</th></tr></thead><tbody>';
            items.forEach(function(item, i) {
              var tag = item.tipo === 'medicao' ? '<span class="tag-med">Valor numérico</span>'
                      : item.tipo === 'texto'  ? '<span class="tag-txt">Texto</span>'
                      :                          '<span class="tag-bool">Sim / Não</span>';
              html += '<tr><td style="color:#94a3b8;font-size:11px">' + (i+1) + '</td>' +
                      '<td>' + item.pergunta + (item.unidade ? ' <span style="color:#94a3b8">(' + item.unidade + ')</span>' : '') + '</td>' +
                      '<td>' + tag + '</td></tr>';
            });
            html += '</tbody></table>';
            document.getElementById('dict-' + tipo).innerHTML = html;
          });
        })
        .withFailureHandler(function(){})
        .getDicionario();
    })();

    function dictTab(tipo, btn) {
      document.querySelectorAll('.dict-tab').forEach(function(b){ b.classList.remove('active'); });
      document.querySelectorAll('.dict-content').forEach(function(d){ d.classList.remove('on'); });
      btn.classList.add('active');
      document.getElementById('dict-' + tipo).classList.add('on');
    }

    // ── Chips setor multi-select ───────────────────────────
    var _pmocSetores = [];

    function pmocTogglePainel() {
      var painel = document.getElementById('pmoc-painel-setores');
      var arrow  = document.getElementById('pmoc-setor-arrow');
      var aberto = painel.style.display !== 'none';
      painel.style.display = aberto ? 'none' : 'block';
      arrow.textContent    = aberto ? '▼' : '▲';
    }

    function _pmocAtualizarBadge() {
      var badge = document.getElementById('pmoc-setor-badge');
      badge.style.display = _pmocSetores.length === 0 ? 'none' : 'inline';
      if (_pmocSetores.length > 0) badge.textContent = _pmocSetores.length + ' selecionado' + (_pmocSetores.length > 1 ? 's' : '');
    }

    function pmocToggleSetor(btn, setor) {
      if (setor === '') {
        _pmocSetores = [];
        document.querySelectorAll('#pmoc-chips-setor .rchip').forEach(function(c){ c.className = 'rchip rchip-off'; });
        document.getElementById('pmoc-chip-todos').className = 'rchip rchip-on';
        _pmocAtualizarBadge();
        // fechar painel ao escolher "Todos"
        document.getElementById('pmoc-painel-setores').style.display = 'none';
        document.getElementById('pmoc-setor-arrow').textContent = '▼';
        return;
      }
      document.getElementById('pmoc-chip-todos').className = 'rchip rchip-off';
      var idx = _pmocSetores.indexOf(setor);
      if (idx >= 0) { _pmocSetores.splice(idx, 1); btn.className = 'rchip rchip-off'; }
      else          { _pmocSetores.push(setor);     btn.className = 'rchip rchip-on';  }
      if (_pmocSetores.length === 0) document.getElementById('pmoc-chip-todos').className = 'rchip rchip-on';
      _pmocAtualizarBadge();
    }

    // Preview
    function pmocCarregar() {
      var mes = document.getElementById('pmoc-mes').value;
      var ano = document.getElementById('pmoc-ano').value;
      var grid = document.getElementById('pmoc-grid');
      grid.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px">Buscando registros...</p>';
      document.getElementById('pmoc-stats').style.display = 'none';

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res.sucesso) {
            grid.innerHTML = '<p style="color:#dc2626;padding:10px">Erro: ' + res.msg + '</p>';
            return;
          }
          _renderGrid(res.resumo, res.totalPressoes || 0, res.totalQualidades || 0, mes, ano);
        })
        .withFailureHandler(function(e) {
          grid.innerHTML = '<p style="color:#dc2626;padding:10px">Falha: ' + e.message + '</p>';
        })
        .getDadosPmocPreview(mes, ano, _pmocSetores);
    }

    var MESES = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    function _renderGrid(resumo, totalPressoes, totalQualidades, mes, ano) {
      var tFil=0,tDut=0,tPre=0,tCor=0,tExa=0,tMov=0,comReg=0,cards='';
      resumo.forEach(function(m) {
        tFil += m.filtros||0; tDut += m.dutos||0; tPre += m.preventivas||0; tCor += m.corretivas||0;
        tExa += m.exaustoes||0; tMov += m.movimenta||0;
        if (m.total > 0) comReg++;
        var vazio = m.total === 0;
        cards += '<div class="pmoc-card' + (vazio ? ' pmoc-card-vazia' : '') + '">';
        if (vazio) cards += '<span class="pmoc-sem-reg">sem registro</span>';
        cards += '<div class="pmoc-card-header"><span class="pmoc-fuel-badge">' + m.fuel + '</span>' +
                 '<span class="pmoc-card-loc">' + (m.localizacao || '—') + '</span></div>';
        cards += '<div class="pmoc-card-modelo">' + (m.marca || '') + ' ' + (m.modelo || '') +
                 ' <span style="font-size:10px;color:#94a3b8">| ' + (m.criticidade || '—') + '</span></div>';
        if (m.empresaCnpj) cards += '<div><span class="pmoc-card-empresa">' + m.empresaCnpj + '</span></div>';
        cards += '<div class="pmoc-badges">' +
          '<span class="pmoc-badge ' + (m.filtros    ? 'filtro' : 'zero') + '">🧹 ' + (m.filtros||0)    + '</span>' +
          '<span class="pmoc-badge ' + (m.dutos      ? 'duto'   : 'zero') + '">🔧 ' + (m.dutos||0)      + '</span>' +
          '<span class="pmoc-badge ' + (m.preventivas? 'prev'   : 'zero') + '">✅ ' + (m.preventivas||0) + '</span>' +
          '<span class="pmoc-badge ' + (m.corretivas ? 'corr'   : 'zero') + '">⚠️ ' + (m.corretivas||0) + '</span>' +
          '<span class="pmoc-badge ' + (m.exaustoes  ? 'prev'   : 'zero') + '">💨 ' + (m.exaustoes||0)  + '</span>' +
          '<span class="pmoc-badge ' + (m.movimenta  ? 'corr'   : 'zero') + '">🚚 ' + (m.movimenta||0)  + '</span>' +
          '</div></div>';
      });
      document.getElementById('pmoc-grid').innerHTML = cards ||
        '<p style="color:#94a3b8;text-align:center;padding:20px;grid-column:1/-1">Nenhuma máquina cadastrada.</p>';

      document.getElementById('st-maq').textContent = resumo.length;
      document.getElementById('st-reg').textContent = comReg;
      document.getElementById('st-fil').textContent = tFil;
      document.getElementById('st-dut').textContent = tDut;
      document.getElementById('st-pre').textContent = tPre;
      document.getElementById('st-cor').textContent = tCor;
      document.getElementById('st-exa').textContent = tExa;
      document.getElementById('st-prs').textContent = totalPressoes;
      document.getElementById('st-qar').textContent = totalQualidades;
      document.getElementById('st-mov').textContent = tMov;
      document.getElementById('pmoc-status').textContent = MESES[mes] + '/' + ano + ' — ' + comReg + ' máquina(s) com registros';
      document.getElementById('pmoc-stats').style.display = 'flex';
    }

    // Gerar PDF
    function pmocGerarPdf() {
      var mes = document.getElementById('pmoc-mes').value;
      var ano = document.getElementById('pmoc-ano').value;
      var eng = document.getElementById('pmoc-engenheiro').value;
      var statusEl = document.getElementById('pmoc-status');
      statusEl.textContent = '⏳ Gerando PDF...';
      statusEl.style.color = '#0ea5e9';
      document.getElementById('pmoc-stats').style.display = 'flex';

      google.script.run
        .withSuccessHandler(function(res) {
          if (res.sucesso) {
            statusEl.textContent = '✅ PMOC gerado!';
            statusEl.style.color = '#16a34a';
            window.open(res.url, '_blank');
          } else {
            statusEl.textContent = '❌ ' + res.msg;
            statusEl.style.color = '#dc2626';
          }
        })
        .withFailureHandler(function(e) {
          statusEl.textContent = '❌ ' + e.message;
          statusEl.style.color = '#dc2626';
        })
        .gerarPmocPdf(mes, ano, eng, _pmocSetores);
    }
  </script>
</div>

name: pmoc
description: "Sistema PMOC - Plano de Manutenção, Operação e Controle de Ar Condicionado."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Ícones iOS style
  cupertino_icons: ^1.0.6

  # Requisições HTTP (comunicação com Apps Script)
  http: ^1.2.1

  # Armazenamento local de preferências (login, sessão)
  shared_preferences: ^2.2.3

  # Banco de dados SQLite local (máquinas offline, fila de envio)
  sqflite: ^2.3.3

  # Verificar conexão com a internet
  connectivity_plus: ^6.0.3

  # Câmera e galeria (fotos dos checklists)
  image_picker: ^1.1.1

  # Localização GPS
  geolocator: ^12.0.0

  # Gerenciar permissões (câmera, GPS, armazenamento)
  permission_handler: ^11.3.1

  # Diretório permanente para fotos offline
  path_provider: ^2.1.4

  # Leitor de código de barras / QR Code (NOVO - substitui barcode_widget)
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true